<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>背單字卡片</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: white;
      width: 300px;
      margin: 20px auto;
      padding: 50px 20px;
      border-radius: 16px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      font-size: 32px;
      cursor: pointer;
    }

    .answer {
      font-size: 24px;
      min-height: 36px;
      color: #555;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>背單字卡片</h1>

  <div id="card" class="card">載入中...</div>
  <div id="answer" class="answer"></div>

  <button onclick="nextCard()">下一張</button>

  <hr>

  <h2>新增單字</h2>
  <input id="english" placeholder="英文，例如 happy">
  <input id="chinese" placeholder="中文，例如 快樂">
  <button onclick="addWord()">新增</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://khtgqtvvpunzbicuvbbc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_gJrHKH854Gyxgqt67DZkAQ_knUwZvTA";

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let words = [];
    let currentWord = null;
    let showEnglishFirst = true;
    let isAnswerShown = false;

    const card = document.getElementById("card");
    const answer = document.getElementById("answer");

    async function loadWords() {
      const { data, error } = await db
        .from("words")
        .select("*")
        .order("id", { ascending: true });

      if (error) {
        console.error(error);
        card.textContent = "讀取失敗";
        return;
      }

      words = data;
      nextCard();
    }

    function nextCard() {
      if (words.length === 0) {
        card.textContent = "目前沒有單字";
        answer.textContent = "";
        return;
      }

      const randomIndex = Math.floor(Math.random() * words.length);
      currentWord = words[randomIndex];

      showEnglishFirst = Math.random() > 0.5;
      isAnswerShown = false;

      card.textContent = showEnglishFirst
        ? currentWord.english
        : currentWord.chinese;

      answer.textContent = "";
    }

    card.addEventListener("click", function () {
      if (!currentWord || isAnswerShown) return;

      answer.textContent = showEnglishFirst
        ? currentWord.chinese
        : currentWord.english;

      isAnswerShown = true;
    });

    async function addWord() {
      const english = document.getElementById("english").value.trim();
      const chinese = document.getElementById("chinese").value.trim();

      if (!english || !chinese) {
        alert("請輸入英文和中文");
        return;
      }

      const { error } = await db
        .from("words")
        .insert({ english, chinese });

      if (error) {
        console.error(error);
        alert("新增失敗");
        return;
      }

      document.getElementById("english").value = "";
      document.getElementById("chinese").value = "";

      await loadWords();
      alert("新增成功");
    }

    loadWords();
  </script>

</body>
</html>
