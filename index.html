<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>根本背不起來</title>

<style>
html,body{ margin: 0; padding: 0; font-family: "Chiron GoRound TC", "Roboto Condensed", "Noto Sans TC", "微軟正黑體", sans-serif;}
.all{ width: 500px; max-width: 100vw; height: calc(100vh - 20px); padding: 10px; margin: 10px auto 0; background: #b2d5e1; border-radius: 5px; box-sizing: border-box;}

.wordCount{ display: flex; justify-content: flex-end;}
.wordCount #wordCount{ display: none;}
.wordCount #progress{ padding: 5px 10px; background: #5ba7c0; color: #fff; border-radius: 5px;}

.card{ margin: 10px 0 0; height: calc(100vh - 200px);}
.card #answer{ display: flex; align-items: center; justify-content: center; height: calc(100% - 200px); background: #fff8f2; color: #5ba7c0; border-radius: 5px; font-size: 2rem;}
.card #card{ margin: 10px 0 0 0; padding: 10px 0; text-align: center; font-size: 1.5rem; line-height: 1em; border: 1px dashed #fff8f2; border-radius: 5px; color: #fff; cursor: pointer;}
.btn_next{ margin: 10px 0 0 0; width: 100%; padding: 10px 0; background: #fff; box-shadow: none; border: none; font-size: 1.5rem; line-height: 1em; border-radius: 5px; color: #5ba7c0; cursor: pointer;}

.addZone{ display: flex; gap: 10px; background: #5ba7c0; width: calc(100% + 20px); margin: 0 0 0 -10px;}
</style>
</head>

<body>

<div class="all">

  <section class="wordCount">
    <div class="info" id="wordCount">載入中...</div>
    <div class="info" id="progress"></div>
  </section>

  <section class="card">
    <div id="answer"></div>
    <div id="card">載入中...</div>
    <button onclick="nextCard()" class="btn_next">下一張</button>
  </section>
  
  <section class="addZone">
    <input id="question" placeholder="問題，例如 행복">
    <input id="answerInput" placeholder="答案，例如 快樂">
    <br>
    <button onclick="addWord()">新增</button>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://khtgqtvvpunzbicuvbbc.supabase.co";
const SUPABASE_KEY = "sb_publishable_gJrHKH854Gyxgqt67DZkAQ_knUwZvTA";

const db = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let words = [];
let shuffledWords = [];
let currentIndex = 0;

let currentWord = null;
let isAnswerShown = false;
let showQuestionFirst = true;

const card = document.getElementById("card");
const answer = document.getElementById("answer");
const wordCount = document.getElementById("wordCount");
const progress = document.getElementById("progress");

function shuffleArray(array) {
  const arr = [...array];

  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(
      Math.random() * (i + 1)
    );

    [arr[i], arr[j]] = [arr[j], arr[i]];
  }

  return arr;
}

async function loadWords() {
  const { data, error } = await db
    .from("words")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    console.error(error);
    card.textContent = "讀取失敗";
    wordCount.textContent = "無法讀取單字";
    return;
  }

  words = data;

  wordCount.textContent =
    `目前總數：${words.length}`;

  shuffledWords = shuffleArray(words);
  currentIndex = 0;

  nextCard();
}

function nextCard() {
  if (words.length === 0) {
    card.textContent = "目前沒有單字";
    answer.textContent = "";
    progress.textContent = "進度：0 / 0";
    return;
  }

  if (currentIndex >= shuffledWords.length) {
    shuffledWords = shuffleArray(words);
    currentIndex = 0;
  }

  currentWord = shuffledWords[currentIndex];
  currentIndex++;

  showQuestionFirst = Math.random() > 0.5;
  isAnswerShown = false;

  card.textContent = showQuestionFirst
    ? currentWord.question
    : currentWord.answer;

  answer.textContent = "";

  progress.textContent =
    `${currentIndex} / ${shuffledWords.length}`;
}

card.addEventListener("click", function () {
  if (!currentWord || isAnswerShown) return;

  answer.textContent = showQuestionFirst
    ? currentWord.answer
    : currentWord.question;

  isAnswerShown = true;
});

async function addWord() {
  const question = document
    .getElementById("question")
    .value
    .trim();

  const answerValue = document
    .getElementById("answerInput")
    .value
    .trim();

  if (!question || !answerValue) {
    alert("請輸入問題與答案");
    return;
  }

  const { error } = await db
    .from("words")
    .insert({
      question: question,
      answer: answerValue
    });

  if (error) {
    console.error(error);
    alert("新增失敗");
    return;
  }

  document.getElementById("question").value = "";
  document.getElementById("answerInput").value = "";

  await loadWords();

  alert("新增成功");
}

loadWords();
</script>

</body>
</html>
